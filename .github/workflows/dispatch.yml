name: Dependency Update

# Auto-trigger disabled — Claude-driven CI. Run manually via
# `gh workflow run dispatch.yml -R nelsong6/fzt-terminal`. Downstream
# consumers are updated manually per repo.
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  # Shared with release.yml so tag-cutting is serialized across dep-update
  # and direct-push release paths (prevents patch-number races).
  group: release-tag
  cancel-in-progress: false

jobs:
  update:
    uses: nelsong6/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      modules: github.com/nelsong6/fzt github.com/nelsong6/fzt-frontend
      # Template handles bump + release atomically. Downstream (fzt-picker,
      # fzt-automate, fzt-browser) is Claude-driven — no repository_dispatch
      # fan-out.
