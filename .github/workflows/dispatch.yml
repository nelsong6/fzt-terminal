name: Engine Update

on:
  repository_dispatch:
    types: [fzt-engine-updated]

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update fzt engine
        env:
          GOPROXY: direct
        run: |
          go get github.com/nelsong6/fzt@latest
          go mod tidy

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet go.mod go.sum; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Already on latest fzt engine"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "go.mod updated:"
            git diff go.mod
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          FZT_VERSION=$(grep 'github.com/nelsong6/fzt ' go.mod | awk '{print $2}')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git commit -m "deps: update fzt engine to ${FZT_VERSION}"
          git push

      - name: Trigger build
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build.yml
