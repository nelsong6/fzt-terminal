name: Dependency Update

# Auto-trigger disabled — Claude-driven CI. `repository_dispatch` from
# upstream fzt releases is ignored. Run manually via
# `gh workflow run dispatch.yml -R nelsong6/fzt-terminal`.
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  # Shared with release.yml so tag-cutting is serialized across dep-update
  # and direct-push release paths (prevents patch-number races).
  group: release-tag
  cancel-in-progress: false

jobs:
  update:
    uses: nelsong6/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      modules: github.com/nelsong6/fzt github.com/nelsong6/fzt-frontend
      # Template handles bump + release + dispatch atomically (no race).
      # Replaces the old separate Tag + Dispatch workflow (build.yml, removed).
      dispatch-repos: fzt-picker,fzt-automate,fzt-browser
      dispatch-event: fzt-updated
