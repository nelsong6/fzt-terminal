name: Engine Update

on:
  repository_dispatch:
    types: [fzt-engine-updated]

concurrency:
  group: engine-update
  cancel-in-progress: false

jobs:
  update:
    uses: nelsong6/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      modules: github.com/nelsong6/fzt
