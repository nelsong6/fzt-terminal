name: Release

# Fires on direct pushes to main. See the fzt-frontend release.yml for the
# full pattern explanation; this file mirrors it with fzt-terminal's
# downstream consumer list.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'go.mod'
      - 'go.sum'
  # Manual recovery: fire the release path without advancing HEAD. Useful
  # when a cascade stranded code on main without a tag and we need to
  # re-release the existing HEAD. The template's skip guard correctly
  # no-ops if the latest release is already at HEAD.
  workflow_dispatch:

concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  release:
    uses: nelsong6/pipeline-templates/.github/workflows/release-and-dispatch-template.yml@main
    with:
      dispatch-repos: fzt-picker,fzt-automate,fzt-browser
      dispatch-event: fzt-updated
